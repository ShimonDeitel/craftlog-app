name: Craftlog
options:
  bundleIdPrefix: com.shimondeitel.knitlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Craftlog:
    type: application
    platform: iOS
    sources:
      - path: Craftlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knitlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Craftlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CraftlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CraftlogTests
      - path: Craftlog.storekit
    dependencies:
      - target: Craftlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knitlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CraftlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CraftlogUITests
    dependencies:
      - target: Craftlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.knitlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Craftlog:
    build:
      targets:
        Craftlog: all
        CraftlogTests: [test]
        CraftlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Craftlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Craftlog.storekit
      targets:
        - CraftlogTests
        - CraftlogUITests
    archive:
      config: Release
